workflow_id: funding_capacity_shock
version: 1
name: Funding Capacity Shock
description: >
  Runs stressed financing capacity first, then adjusts money-market reserves
  based on funding pressure.
domains:
  - financing
  - money_market
tags:
  - funding
  - capacity
  - stress
  - demo
default_context:
  scenario: capacity_shock
  solver_backend: scipy
  problem_type: lp
inputs:
  - key: portfolio_id
    label: Portfolio ID
    type: string
    default: PORT_001
  - key: financing.total_funding_need
    label: Funding need
    type: currency
    default: 350000000
  - key: financing.capacity_scale
    label: Capacity scale
    type: fraction
    default: 0.45
  - key: execution_mode
    label: Execution mode
    type: select
    default: recommendation
    options:
      - recommendation
      - stage
      - execute
      - change_constraints
  - key: governance.materiality_notional
    label: Materiality notional
    type: currency
    default: 350000000
  - key: governance.estimated_pnl_impact
    label: Estimated PnL impact
    type: currency
    default: 0
  - key: governance.production_constraint_change
    label: Production constraint change
    type: boolean
    default: false
steps:
  - step_id: financing_001
    domain: financing
    name: Funding capacity shock optimization
    objective_metric: funding_spread
    objective_direction: minimize
    context:
      n_counterparties: 10
      total_funding_need: 350000000
      spread_shift: 1.8
      capacity_scale: 0.45
      max_cp_concentration: 0.35
  - step_id: money_market_001
    domain: money_market
    name: Liquidity reserve response
    objective_metric: yield
    objective_direction: maximize
    depends_on:
      - financing_001
    context:
      n_funds: 8
      total_cash: 400000000
      daily_liquidity_req: 0.35
      weekly_liquidity_req: 0.65
      max_prime_fraction: 0.35
      max_wam_days: 55
    dependency_rules:
      - source_step_id: financing_001
        rule_type: funding_pressure_liquidity_buffer
        target_context_keys:
          - daily_liquidity_req
          - weekly_liquidity_req
