preset_id: governed_recommendation_baseline
version: 1
name: Governed Recommendation Baseline
description: >
  Baseline governance walkthrough showing a standard recommendation that does
  not cross materiality thresholds or change production constraints.
audience: Risk, treasury, and control stakeholders
workflow_id: collateral_liquidity_review
portfolio_id: PORT_GOV_BASE
seed: 23
duration_minutes: 5
context:
  scenario: governed_recommendation_baseline
  solver_backend: scipy
  problem_type: lp
  execution_mode: recommendation
  governance:
    materiality_notional: 450000000
    estimated_pnl_impact: 500000
    production_constraint_change: false
  collateral:
    obligation_scale: 1.55
    concentration_limit: 0.55
  money_market:
    total_cash: 450000000
    daily_liquidity_req: 0.35
    weekly_liquidity_req: 0.65
    max_prime_fraction: 0.40
    max_wam_days: 55
talking_points:
  - Show that ordinary recommendation workflows remain advisory.
  - Confirm the governance panel reports no escalation.
  - Use this as the control run before materiality demos.
success_criteria:
  - Workflow completes with recommendation mode.
  - Governance status is not required.
  - No production constraint change is flagged.
